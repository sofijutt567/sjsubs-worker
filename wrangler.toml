name = "smm"                           # confirmed from your dashboard
main = "worker/worker.js"              # matches the file path in your repo (sofijutt567/sjsubs-worker)
compatibility_date = "2026-07-15"      # ✅ fixed — matches your worker's real remote value (from the build log diff)
workers_dev = true                     # ✅ fixed — was being turned off by mistake
preview_urls = true                    # ✅ fixed — was being turned off by mistake

[observability]
enabled = true

[observability.logs]
enabled = true

# ===== ROUTES (real routes, taken from your build log diff) =====
[[routes]]
pattern = "sjsubs.online/all-products"
zone_name = "sjsubs.online"

[[routes]]
pattern = "sjsubs.online/api/*"
zone_name = "sjsubs.online"

[[routes]]
pattern = "sjsubs.online/category/*"
zone_name = "sjsubs.online"

[[routes]]
pattern = "sjsubs.online/payment.html"
zone_name = "sjsubs.online"

[[routes]]
pattern = "sjsubs.online/payment.html*"
zone_name = "sjsubs.online"

[[routes]]
pattern = "sjsubs.online/product/*"
zone_name = "sjsubs.online"

# ===== R2 BUCKET BINDING (payment screenshots) =====
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "productsimages"         # ✅ fixed — your real bucket name (from the build log diff)

# ===== KV NAMESPACE BINDING (product/category page cache) =====
[[kv_namespaces]]
binding = "SJSUBS_KV"
id = "ae6cca8649af4a699c1dab3a1d652e1a"   # ✅ fixed — your real KV namespace ID (from the build log diff)

