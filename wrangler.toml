name = "sjsubs-worker"                 # ⚠️ CHECK: must match your EXISTING worker's name exactly
                                        # (Cloudflare dashboard → Workers & Pages → your worker's name is shown at the top)
main = "src/index.js"                  # path to your worker code inside the repo (rename test.html → src/index.js)
compatibility_date = "2024-09-23"

# ===== ROUTES (so sjsubs.online keeps pointing at this worker) =====
[[routes]]
pattern = "sjsubs.online/*"
zone_name = "sjsubs.online"

# ===== R2 BUCKET BINDING (payment screenshots) =====
# ⚠️ CHECK current values: Cloudflare dashboard → Workers & Pages → your worker →
# Settings → Bindings → find the R2 binding row. "binding" name MUST stay BUCKET
# (the code uses env.BUCKET) — bucket_name must match your actual R2 bucket name.
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "productsimages"    # ⚠️ REPLACE with your real bucket name

# ===== KV NAMESPACE BINDING (product/category page cache) =====
# ⚠️ CHECK current value: Cloudflare dashboard → Workers & Pages → your worker →
# Settings → Bindings → find the KV row → copy its Namespace ID from there,
# OR: Workers & Pages → KV (left sidebar) → find the namespace → copy its ID.
# "binding" name MUST stay SJSUBS_KV (the code uses env.SJSUBS_KV).
[[kv_namespaces]]
binding = "SJSUBS_KV"
id = "sjsubs_kv"       # ⚠️ REPLACE with your real KV namespace ID

