#   ADMIN_UPLOAD_KEY       (admin panel auth key — required for /admin routes)
#   EMAILJS_PRIVATE_KEY    = "cqexJMeEoOTN2KfQzomSG"
#   SESSION_SECRET          (long random string — for login session cookies)
